<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vectras Catalog</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="title">
<h1>Vectras Catalog</h1>
<p>Virtual Machine Library</p>
</div>

<div class="searchContainer">

<input
id="search"
type="text"
placeholder="Search VMs..."
oninput="filterVMs()">

</div>

</header>

<main>

<div
id="vmList"
class="vmList">

</div>

</main>

<!-- ========================= -->

<div
id="infoModal"
class="modal">

<div class="modalCard">

<div class="modalHeader">

<div>

<h2 id="vmTitle">
Loading...
</h2>

<p id="vmSubtitle">
</p>

</div>

<button
class="closeButton"
onclick="closeInfo()">

✕

</button>

</div>

<div class="tabBar">

<button
class="tab active"
onclick="openTab('information')">

Information

</button>

<button
class="tab"
onclick="openTab('qemu')">

QEMU

</button>

</div>

<div
id="information"
class="tabContent active">

<table class="infoTable">

<tr>

<td>Name</td>

<td id="infoName"></td>

</tr>

<tr>

<td>Author</td>

<td id="infoAuthor"></td>

</tr>

<tr>

<td>Version</td>

<td id="infoVersion"></td>

</tr>

<tr>

<td>Architecture</td>

<td id="infoArch"></td>

</tr>

<tr>

<td>File Size</td>

<td id="infoFileSize"></td>

</tr>

<tr>

<td>Disk Size</td>

<td id="infoDiskSize"></td>

</tr>

</table>

<h3>Description</h3>

<p id="infoDescription"></p>

<a
id="infoSource"
target="_blank">

Description Source

</a>

</div>

<div
id="qemu"
class="tabContent">

<h3>QEMU Command</h3>

<pre id="qemuCommand"></pre>

<h3>Decoded</h3>

<div
id="qemuDecoded">

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
